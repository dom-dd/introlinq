name: Daily publisher discovery

# Vercel's Hobby plan caps native Cron Jobs at 2 per account (already used
# by api/sync/openintro and api/cron/weekly-stats) AND caps Serverless
# Functions at 12 per deployment (already at the limit), so this daily
# trigger lives here instead - the discovery logic runs inside the existing
# api/admin.js function (resource=run-discovery) rather than a new file,
# triggered by GitHub Actions' free scheduler rather than Vercel's own cron.
#
# Two schedules: 06:00 UTC is the real daily run. 12:00 UTC is a same-day
# retry slot - it only calls the endpoint if the 06:00 run didn't already
# succeed today, so a normal day makes exactly one SerpAPI-spending request,
# not two.
#
# After discovery, this also runs discovery/classify.js directly on the
# runner (not through api/admin.js - that function is already at Vercel's
# 12-function cap and its 60s maxDuration is too tight for a full classify+
# enrich batch). classify.js auto-cascades into Apollo enrichment for
# whatever it classifies as "publisher". Needs DATABASE_URL, ANTHROPIC_API_KEY
# and APOLLO_API_KEY as repo secrets (Settings -> Secrets and variables ->
# Actions) in addition to CRON_SECRET - these spend real money per lead, so
# removing/renaming any of them here pauses that spend without touching code.
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: {} # allows a manual "Run workflow" trigger from the Actions tab

jobs:
  trigger-discovery:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Decide whether this slot needs to run
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.schedule }}" != "0 12 * * *" ]; then
            echo "Primary slot (or manual trigger) - always runs."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          already_ok=$(gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" \
            --json conclusion,createdAt,event \
            --jq "[.[] | select(.event==\"schedule\" and (.createdAt | startswith(\"$today\")) and .conclusion==\"success\")] | length")
          if [ "${already_ok:-0}" -gt 0 ]; then
            echo "06:00 run already succeeded today - skipping retry slot."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "06:00 run did not succeed today - using the retry slot."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Call discovery endpoint
        if: steps.gate.outputs.should_run == 'true'
        run: |
          status=$(curl -s -o response.json -w "%{http_code}" --max-time 75 \
            -X GET "https://www.introlinq.com/api/admin?resource=run-discovery" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $status"
          cat response.json
          if [ "$status" -ne 200 ]; then
            echo "Discovery cron failed"
            exit 1
          fi

      # Runs even if discovery above failed (always()) - classify/enrich talk
      # directly to Neon/Anthropic/Apollo, not through Vercel, so a Vercel-side
      # failure has no bearing on whether there's a backlog worth processing.
      - name: Checkout
        if: always() && steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: always() && steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: always() && steps.gate.outputs.should_run == 'true'
        run: npm ci

      - name: Classify + enrich publisher leads
        if: always() && steps.gate.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: node discovery/classify.js
